<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artist Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
<h2>Artist Panel</h2>
<ul>
<li>Dashboard</li>
<li>Upload Art</li>
<li>Gallery</li>
<li>Orders</li>
<li>Earnings</li>
<li>Profile</li>
</ul>
</div>
<div class="main">
<h1>Welcome Artist 🎨</h1>

<div class="cards">
<div class="card">Total Arts: 10</div>
<div class="card">Orders: 5</div>
<div class="card">Earnings: ₹5000</div>
</div>

<h2>Upload Artwork</h2>

<form>
<input type="text" placeholder="Title"><br>
<input type="number" placeholder="Price"><br>
<input type="file"><br>
<button>Upload</button>
</form>

</div>
</body>
</html>
